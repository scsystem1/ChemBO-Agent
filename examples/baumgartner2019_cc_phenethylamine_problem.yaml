# ChemBO Agent - Baumgartner 2019 C-N Coupling Benchmark (Phenethylamine)
# =====================================================================

problem:
  description: |
    Optimize the yield of a Baumgartner 2019 Buchwald-Hartwig C-N coupling
    benchmark for the fixed nucleophile Phenethylamine. The search space is
    restricted to the experimentally observed conditions present in the vendored
    CSV. During simulation, the optimizer should not see the yield column;
    yields are revealed only via the dataset oracle at the human-interrupt step.

  reaction_type: CC
  target_metric: yld
  optimization_direction: maximize
  budget: 40

  reaction:
    family: Buchwald-Hartwig C-N coupling
    reaction_smiles: ""
    substrates: []
    product_smiles: ""
    known_fixed_context:
      - role: nucleophile
        value: "Phenethylamine"
      - role: nucleophile_SMILES
        value: "C1=CC=C(C=C1)CCN"
      - role: solvent
        value: "2-MeTHF"
      - role: solvent_SMILES
        value: "CC1CCCO1"

  retrieval:
    goals: [precedent, mechanism, property]
    must_match_roles: [reaction_family, catalyst_precursor, base]
    prefer_sources: [ord, reviews, textbooks]
    query_mode: optimize_conditions

  variables:
    - name: precatalyst_SMILES
      role: catalyst_precursor
      type: categorical
      domain:
        - "CC(C)C1=CC(=C(C(=C1)C(C)C)C2=C(C=CC(=C2P(C(C)(C)C)C(C)(C)C)OC)OC)C(C)C"
        - "CC(C)C1=CC(=C(C(=C1)C(C)C)C2=CC=CC=C2P(C(C)(C)C)C(C)(C)C)C(C)C"
        - "CCCCC1=C(C(=C(C(=C1F)F)C2=C(C=C(C(=C2C(C)C)C3=C(C(=CC=C3)OC)P(C45CC6CC(C4)CC(C6)C5)C78CC9CC(C7)CC(C9)C8)C(C)C)C(C)C)F)F"
      description: "Precatalyst encoded as a raw SMILES string present in the dataset."

    - name: base_SMILES
      role: base
      type: categorical
      domain:
        - "C1CCC2=NCCCN2CC1"
        - "CC(C)(C)N=C(N(C)C)N(C)C"
        - "CC(C)(C)N=P(N1CCCC1)(N2CCCC2)N3CCCC3"
        - "CN1CCCN2C1=NCCC2"
      description: "Base encoded as a raw SMILES string present in the dataset."

    - name: base_concentration
      role: concentration
      type: categorical
      domain:
        - "0.99"
        - "1.00"
        - "1.01"
        - "1.19"
        - "1.33"
        - "1.34"
        - "1.35"
        - "1.36"
        - "1.39"
        - "1.40"
        - "1.41"
        - "1.45"
        - "1.47"
        - "1.49"
        - "1.50"
        - "1.53"
        - "1.67"
        - "1.80"
      unit: "M"
      description: "Discrete base concentration levels observed in the dataset."

    - name: base_equivalents
      role: stoichiometry
      type: categorical
      domain:
        - "1.1"
        - "1.3"
        - "1.5"
        - "1.6"
        - "1.7"
        - "1.8"
        - "2.0"
      description: "Discrete base equivalents observed in the dataset."

    - name: temperature
      role: temperature
      type: categorical
      domain:
