  constraints:
    - "Only propose conditions that correspond to rows present in the baumgartner2019_cc_phenethylamine.csv dataset."
    - "Keep nucleophile and solvent fixed to the annotated reaction context for this benchmark."

  dataset:
    csv_path: ../data/CC_dataset/processed_data/baumgartner2019_cc_phenethylamine.csv
    feature_columns:
      - precatalyst_SMILES
      - base_SMILES
      - base_concentration
      - base_equivalents
      - temperature
      - t_res
    target_column: yld
    row_id_column: ""

  initial_data: []
