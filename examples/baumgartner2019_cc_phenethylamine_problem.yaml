        - "92"
        - "94"
        - "96"
        - "97"
        - "100"
      unit: "degC"
      description: "Discrete temperature levels observed in the dataset."

    - name: t_res
      role: residence_time
      type: categorical
      domain:
        - "74"
        - "75"
