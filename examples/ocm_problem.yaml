# ChemBO Agent - Dataset-Backed OCM Benchmark
# ===========================================
#
# Keep catalyst categorical domains in sync with data/OCM.csv.

problem:
  description: |
    Optimize the C2+ yield of an Oxidative Coupling of Methane (OCM) reaction
    using the vendored OCM dataset. The search space is restricted to the
    experimentally observed conditions present in the CSV. During simulation,
    the optimizer should not see the Performance column; outcomes are revealed
    only via the dataset oracle at the human-interrupt step.

    The catalyst is defined by three optional metal components (M1, M2, M3)
    deposited on a support. Process variables include temperature, argon,
    methane, oxygen flow rates, and contact time.

  reaction_type: OCM
  target_metric: C2+ yield
  optimization_direction: maximize
  budget: 40

  reaction:
    family: OCM
    reaction_smiles: ""
    substrates: []
    product_smiles: ""
    known_fixed_context: []

  retrieval:
    goals: [precedent, mechanism, property]
    must_match_roles: [reaction_family, metal_primary, support]
    prefer_sources: [ord, reviews]
    query_mode: optimize_conditions

  variables:
    - name: M1
      role: metal_primary
      type: categorical
      domain:
        - "Ce"
        - "Co"
        - "Cu"
        - "Eu"
        - "Fe"
        - "Hf"
        - "La"
        - "Mn"
        - "Mo"
        - "Nd"
        - "Ni"
        - "Pd"
        - "Tb"
        - "Ti"
        - "V"
        - "Y"
        - "Zn"
        - "Zr"
        - "n.a."
      description: "Primary redox metal component; 'n.a.' means the site is intentionally vacant."

    - name: M2
      role: metal_promoter
      type: categorical
      domain:
        - "Ba"
        - "Ca"
        - "Fe"
        - "K"
        - "Li"
        - "Mg"
        - "Na"
        - "Sr"
        - "Zn"
        - "n.a."
      description: "Promoter metal component; additives can substantially change catalyst behavior."

    - name: M3
      role: metal_selector
      type: categorical
      domain:
        - "Mo"
        - "W"
        - "n.a."
      description: "Selector-like metal component; identity may shift the C2/COx tradeoff."

    - name: Support
      role: support
      type: categorical
      domain:
        - "Al2O3"
        - "BEA"
        - "BN"
        - "CeO2"
        - "MgO"
        - "Nb2O5"
        - "SiC"
        - "SiCnf"
        - "SiO2"
        - "TiO2"
        - "ZSM-5"
        - "ZrO2"
        - "n.a."
      description: "Catalyst support material; support identity can strongly affect phase behavior and performance."

    - name: Temp
      role: temperature
      type: continuous
      domain: [700.0, 900.0]
      unit: "C"
      description: "Continuous temperature range spanning the observed dataset values."

    - name: Ar_flow
      role: flow_rate
      type: continuous
      domain: [1.5, 14.0]
      unit: "mL/min"
      description: "Continuous argon diluent flow range spanning the observed dataset values."

    - name: CH4_flow
      role: flow_rate
      type: continuous
      domain: [2.0, 14.6]
      unit: "mL/min"
      description: "Continuous methane feed range; combined with O2_flow it sets the CH4/O2 ratio."

    - name: O2_flow
      role: flow_rate
      type: continuous
      domain: [0.4, 5.7]
      unit: "mL/min"
      description: "Continuous oxygen feed range; should be considered jointly with methane flow."

    - name: CT
      role: contact_time
      type: continuous
      domain: [0.38, 0.75]
      unit: "s*g/mL"
      description: "Continuous contact-time range spanning the observed dataset values."

  constraints:
    - "Only propose conditions that correspond to rows present in the OCM dataset."
    - "Maintain a plausible methane-rich OCM operating window."
    - "Avoid support-only catalyst compositions where all three optional metal roles are vacant."

  dataset:
    csv_path: ../data/OCM.csv
    # The raw CSV keeps auxiliary metadata columns such as M1_mol/M2_mol/M3_mol.
    # Only the nine feature_columns below participate in optimization and lookup keys.
    feature_columns:
      - M1
      - M2
      - M3
      - Support
      - Temp
      - Ar_flow
      - CH4_flow
      - O2_flow
      - CT
    target_column: Performance
    row_id_column: ""

  initial_data: []
