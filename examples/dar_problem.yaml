# ChemBO Agent — Dataset-Backed DAR Benchmark
# ===========================================

problem:
  description: |
    Optimize the yield of a Direct Arylation Reaction (DAR) benchmark using the
    vendored DAR dataset. The search space is restricted to the experimentally
    observed conditions present in the CSV. During simulation, the optimizer
    should not see the yield column; yields are revealed only via the dataset
    oracle at the human-interrupt step.

  reaction_type: DAR
  target_metric: yield
  optimization_direction: maximize
  budget: 35

  reaction:
    family: DAR
    reaction_smiles: ""
    substrates: []
    product_smiles: ""
    known_fixed_context:
      - role: catalyst_precursor
        value: "Pd(OAc)2"

  retrieval:
    goals: [precedent, mechanism, property]
    must_match_roles: [reaction_family, ligand, base]
    prefer_sources: [ord, reviews, textbooks]
    query_mode: optimize_conditions

  variables:
    - name: base_SMILES
      role: base
      type: categorical
      domain:
        - "O=C([O-])C(C)(C)C.[Cs+]"
        - "O=C([O-])C(C)(C)C.[K+]"
        - "O=C([O-])C.[Cs+]"
        - "O=C([O-])C.[K+]"
      description: "Base encoded as a raw SMILES string present in the dataset"

    - name: ligand_SMILES
      role: ligand
      type: categorical
      domain:
        - "CC(C)(C)P(C1=CC=CC=C1)C(C)(C)C"
        - "CC(C)C1=CC(C(C)C)=C(C(C(C)C)=C1)C2=C(P(C3CCCCC3)C4CCCCC4)C(OC)=CC=C2OC"
        - "CC(C1=C(C2=CC=CC=C2P(C3CCCCC3)C4CCCCC4)C(C(C)C)=CC(C(C)C)=C1)C"
        - "CC(OC1=C(P(C2CCCCC2)C3CCCCC3)C(OC(C)C)=CC=C1)C"
        - "CN(C)C1=CC=CC(N(C)C)=C1C2=CC=CC=C2P(C(C)(C)C)C3=CC=CC=C3"
        - "CP(C)C1=CC=CC=C1"
        - "CP(C1=CC=CC=C1)C2=CC=CC=C2"
        - "C[C@]1(O2)O[C@](C[C@]2(C)P3C4=CC=CC=C4)(C)O[C@]3(C)C1"
        - "FC(F)(F)C1=CC(P(C2=C(C3=C(C(C)C)C=C(C(C)C)C=C3C(C)C)C(OC)=CC=C2OC)C4=CC(C(F)(F)F)=CC(C(F)(F)F)=C4)=CC(C(F)(F)F)=C1"
        - "P(C1=CC=CC=C1)(C2=CC=CC=C2)C3=CC=CC=C3"
        - "P(C1=CC=CO1)(C2=CC=CO2)C3=CC=CO3"
        - "P(C1CCCCC1)(C2CCCCC2)C3CCCCC3"
      description: "Ligand encoded as a raw SMILES string present in the dataset"

    - name: solvent_SMILES
      role: solvent
      type: categorical
      domain:
        - "CC(N(C)C)=O"
        - "CC1=CC=C(C)C=C1"
        - "CCCC#N"
        - "CCCCOC(C)=O"
      description: "Solvent encoded as a raw SMILES string present in the dataset"

    - name: concentration
      role: concentration
      type: categorical
      domain: ["0.057", "0.1", "0.153"]
      unit: "M"
      description: "Discrete concentration levels observed in the dataset"

    - name: temperature
      role: temperature
      type: categorical
      domain: ["105", "120", "90"]
      unit: "°C"
      description: "Discrete temperature levels observed in the dataset"

  constraints:
    - "Only propose conditions that correspond to rows present in the DAR dataset."

  dataset:
    csv_path: ../data/DAR.csv
    feature_columns:
      - base_SMILES
      - ligand_SMILES
      - solvent_SMILES
      - concentration
      - temperature
    target_column: yield
    row_id_column: ""

  initial_data: []
